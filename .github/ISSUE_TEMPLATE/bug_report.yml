name: Bug Report
description: Report a reproducible CueShot bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the capture mode and the exact action you took.
      placeholder: |
        1. Open CueShot
        2. Click the menu bar icon
        3. Arm Element mode
        4. Click ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Capture mode
      options:
        - Element
        - Window
        - Area
        - Selection
        - Screen
        - Settings or onboarding
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions granted
      options:
        - label: Accessibility is granted
        - label: Screen Recording is granted
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Privacy-safe screenshots or recording
      description: Attach only media that does not expose private information.
